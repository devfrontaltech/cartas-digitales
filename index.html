<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas de Restaurantes</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,0.06);
      --card-hover: rgba(255,255,255,0.12);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      max-width: 800px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
    }

    .search {
      margin: 20px 0 30px;
      width: 100%;
      max-width: 500px;
    }

    .search input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      transition: 0.2s;
    }

    .search input:focus {
      border-color: var(--accent);
    }

    .grid {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      text-decoration: none;
      color: var(--text);
      transition: 0.2s ease;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      background: var(--card-hover);
      border-color: rgba(56,189,248,0.4);
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .card span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer {
      margin-top: 50px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🍽️ Cartas de Restaurantes</h1>
    <p>Selecciona una plantilla para abrir la carta digital</p>
  </header>

  <div class="search">
    <input id="search" type="text" placeholder="Buscar restaurante..." />
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    Hecho con ❤️ para tus cartas digitales
  </footer>

  <script>
    let restaurants = [];

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");

    function render(list) {
      grid.innerHTML = "";

      list.forEach(r => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = r.url;

        a.innerHTML = `
          <h3>${r.nombre}</h3>
          <span>Abrir carta →</span>
        `;

        grid.appendChild(a);
      });
    }

    fetch("restaurants.json")
      .then(res => res.json())
      .then(data => {
        restaurants = data;
        render(restaurants);
      });

    search.addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase();
      const filtered = restaurants.filter(r =>
        r.nombre.toLowerCase().includes(value)
      );
      render(filtered);
    });
  </script>

</body>
</html>
