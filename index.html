<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas de Restaurantes</title>

  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(255, 255, 255, 0.06);
      --card-hover: rgba(255, 255, 255, 0.12);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px; /* 👈 clave: más estrecho */
    }

    .card {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px 18px;
      text-align: center; /* 👈 centrado */
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      background: var(--card-hover);
      border-color: rgba(56, 189, 248, 0.4);
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card span {
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer {
      margin-top: 50px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 480px) {
      .grid {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🍽️ Cartas Digitales</h1>
    <p>Selecciona un restaurante para ver su carta</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    Hecho con ❤️ para tus plantillas
  </footer>

  <script>
    const grid = document.getElementById("grid");

    fetch("restaurants.json")
      .then(res => res.json())
      .then(data => {
        data.forEach(r => {
          const a = document.createElement("a");
          a.className = "card";
          a.href = r.url;

          a.innerHTML = `
            <h3>${r.nombre}</h3>
            <span>Abrir carta →</span>
          `;

          grid.appendChild(a);
        });
      });
  </script>

</body>
</html>
